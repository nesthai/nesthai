{{!-- Partial: Bouton WhatsApp sticky --}}
<style>
.whatsapp-sticky{position:fixed;bottom:25px;right:25px;z-index:9999;display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;padding:14px 20px;border-radius:50px;text-decoration:none;font-family:var(--font-sans),'Inter',sans-serif;font-weight:500;font-size:14px;box-shadow:0 4px 15px rgba(37,211,102,0.4);transition:all .3s ease;animation:whatsappPulse 2s infinite}
.whatsapp-sticky:hover{background:#128C7E;transform:translateY(-3px);box-shadow:0 6px 20px rgba(37,211,102,0.5);color:#fff}
.whatsapp-sticky::before{content:"💬";font-size:20px}
@keyframes whatsappPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.6)}70%{box-shadow:0 0 0 15px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
@media(max-width:768px){.whatsapp-sticky{bottom:15px;right:15px;padding:12px 16px;font-size:13px}}
</style>
<a href="https://wa.me/{{site.whatsapp}}" class="whatsapp-sticky" target="_blank" rel="noopener noreferrer">
    <span>Nous contacter</span>
</a>
